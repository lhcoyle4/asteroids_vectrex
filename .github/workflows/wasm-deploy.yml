name: PERMADRIFT — Build WASM & Deploy

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'Makefile'
      - '.github/workflows/wasm-deploy.yml'
      - 'src/wasm_shell.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wasm-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Emscripten SDK
        uses: actions/cache@v4
        with:
          path: emsdk
          key: emsdk-3.1.60-${{ runner.os }}

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.60
          actions-cache-folder: emsdk

      - name: Build WASM
        run: |
          emcc -Wall -Wextra -std=c99 -O2 \
            -I include \
            -s USE_SDL=2 \
            -s USE_SDL_MIXER=2 \
            -s ALLOW_MEMORY_GROWTH=1 \
            --shell-file src/wasm_shell.html \
            -o index.html \
            src/main.c src/vector_graphics.c src/game.c src/vector_font.c src/audio.c

      - name: Stage WASM artifacts
        run: |
          mkdir -p wasm_dist
          cp index.html index.js index.wasm wasm_dist/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: wasm_dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'PERMADRIFT WASM — ${{ github.sha }}'
